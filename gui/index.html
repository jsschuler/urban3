<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Urban ABM Control</title>
<style>
:root {
  --bg: #101315;
  --panel: #181d20;
  --panel2: #20272b;
  --line: #314047;
  --text: #edf2f3;
  --muted: #9aa8ad;
  --green: #5fd08c;
  --red: #e35d6a;
  --gold: #e9be62;
  --blue: #68a7ff;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}
header {
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 22px;
  border-bottom: 1px solid var(--line);
  background: #14191b;
}
h1 { margin: 0; font-size: 20px; font-weight: 700; }
h2 { margin: 0 0 12px; font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }
.status { display: flex; gap: 10px; align-items: center; color: var(--muted); font-size: 14px; }
.dot { width: 10px; height: 10px; border-radius: 50%; background: var(--red); }
.dot.on { background: var(--green); }
.wrap { display: grid; grid-template-columns: 310px 1fr 340px; gap: 16px; padding: 16px; }
.panel {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 14px;
  margin-bottom: 16px;
}
.controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
button {
  min-height: 36px;
  border: 1px solid transparent;
  border-radius: 6px;
  background: var(--panel2);
  color: var(--text);
  font-weight: 700;
  cursor: pointer;
}
button:hover { border-color: var(--blue); }
.primary { background: var(--green); color: #09110d; }
.danger { background: var(--red); color: #160507; }
.field { margin-bottom: 10px; }
label { display: flex; justify-content: space-between; gap: 8px; color: var(--muted); font-size: 12px; margin-bottom: 4px; }
input {
  width: 100%;
  height: 32px;
  border: 1px solid var(--line);
  border-radius: 6px;
  background: #111619;
  color: var(--text);
  padding: 0 8px;
}
.stats { display: grid; grid-template-columns: repeat(4, minmax(110px, 1fr)); gap: 10px; }
.stat { background: var(--panel2); border: 1px solid var(--line); border-radius: 8px; padding: 12px; min-height: 76px; }
.stat .k { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .06em; }
.stat .v { margin-top: 8px; font-size: 24px; font-weight: 800; font-variant-numeric: tabular-nums; }
canvas { width: 100%; background: #0d1113; border: 1px solid var(--line); border-radius: 6px; }
#map { aspect-ratio: 1; image-rendering: pixelated; }
#sales, #sizes { height: 160px; }
.log { height: 190px; overflow: auto; background: #0d1113; border: 1px solid var(--line); border-radius: 6px; padding: 8px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; color: var(--muted); font-size: 12px; }
.row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
@media (max-width: 1100px) { .wrap { grid-template-columns: 1fr; } .stats { grid-template-columns: repeat(2, 1fr); } }
</style>
</head>
<body>
<header>
  <h1>Urban ABM</h1>
  <div class="status"><span id="dot" class="dot"></span><span id="status">Disconnected</span></div>
</header>

<main class="wrap">
  <section>
    <div class="panel">
      <h2>Run</h2>
      <div class="controls">
        <button class="primary" onclick="sendCommand('start')">Start</button>
        <button onclick="sendCommand('pause')">Pause</button>
        <button onclick="sendCommand('step')">Step</button>
        <button class="danger" onclick="sendCommand('reset')">Reset</button>
      </div>
    </div>

    <div class="panel">
      <h2>Parameters</h2>
      <div class="row">
        <div class="field"><label>Width</label><input id="p-width" type="number" value="24" min="4"></div>
        <div class="field"><label>Height</label><input id="p-height" type="number" value="24" min="4"></div>
      </div>
      <div class="row">
        <div class="field"><label>Workers</label><input id="p-initial_workers" type="number" value="160" min="1"></div>
        <div class="field"><label>Firms</label><input id="p-initial_firms" type="number" value="16" min="1"></div>
      </div>
      <div class="row">
        <div class="field"><label>Entry rate</label><input id="p-outside_entry_rate" type="number" value="3" min="0" step="0.1"></div>
        <div class="field"><label>Seed</label><input id="p-seed" type="number" value="42"></div>
      </div>
      <div class="row">
        <div class="field"><label>Job review</label><input id="p-job_review_prob" type="number" value="0.2" min="0" max="1" step="0.01"></div>
        <div class="field"><label>Home review</label><input id="p-housing_review_prob" type="number" value="0.2" min="0" max="1" step="0.01"></div>
      </div>
      <div class="row">
        <div class="field"><label>Res add</label><input id="p-residential_add_prob" type="number" value="0.01" min="0" max="1" step="0.001"></div>
        <div class="field"><label>Com add</label><input id="p-commercial_add_prob" type="number" value="0.006" min="0" max="1" step="0.001"></div>
      </div>
      <div class="field"><label>Blender update ticks</label><input id="p-blender_update_every" type="number" value="5" min="0"></div>
      <div class="controls">
        <button onclick="sendParams()">Apply</button>
        <button onclick="saveParams()">Save</button>
        <button onclick="loadParams()">Load</button>
        <button onclick="resetParams()">Defaults</button>
      </div>
    </div>
  </section>

  <section>
    <div class="panel">
      <h2>Diagnostics</h2>
      <div class="stats" id="stats"></div>
    </div>
    <div class="panel">
      <h2>Spatial Occupancy</h2>
      <canvas id="map" width="480" height="480"></canvas>
    </div>
  </section>

  <section>
    <div class="panel">
      <h2>Goods Sales</h2>
      <canvas id="sales" width="320" height="160"></canvas>
    </div>
    <div class="panel">
      <h2>Firm Sizes</h2>
      <canvas id="sizes" width="320" height="160"></canvas>
    </div>
    <div class="panel">
      <h2>Event Log</h2>
      <div class="log" id="log"></div>
    </div>
  </section>
</main>

<script>
const url = "ws://127.0.0.1:8766";
let ws;
let latest = null;
const statKeys = [
  "tick", "population", "employment", "unemployment",
  "unhoused", "firm_count", "firm_entries", "firm_exits",
  "residential_units", "commercial_units", "residential_vacancy_rate", "commercial_vacancy_rate",
  "mean_residential_rent", "mean_commercial_rent", "mean_wage", "mean_commute"
];

function connect() {
  ws = new WebSocket(url);
  ws.onopen = () => setStatus(true, false);
  ws.onclose = () => { setStatus(false, false); setTimeout(connect, 1000); };
  ws.onmessage = event => handle(JSON.parse(event.data));
}

function setStatus(connected, running) {
  document.getElementById("dot").className = "dot" + (connected ? " on" : "");
  document.getElementById("status").textContent = connected ? (running ? "Running" : "Connected") : "Disconnected";
}

function handle(msg) {
  if (msg.type === "run_status") setStatus(true, msg.running);
  if (msg.type === "event_log") log(msg.message);
  if (msg.type === "diagnostic_snapshot") {
    latest = msg;
    renderStats(msg);
    drawBars("sales", msg.goods_sales_by_type || {});
    drawHistogram("sizes", msg.firm_size_distribution || []);
    drawMapApprox(msg);
  }
}

function sendCommand(command) {
  if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({command}));
}

function paramIds() {
  return [...document.querySelectorAll("input[id^='p-']")].map(el => el.id.slice(2));
}

function readParams() {
  const out = {};
  for (const id of paramIds()) out[id] = Number(document.getElementById("p-" + id).value);
  return out;
}

function sendParams() {
  if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({command: "parameter_update", parameters: readParams()}));
}

function saveParams() {
  localStorage.setItem("urban-abm-params", JSON.stringify(readParams()));
  log("parameter set saved");
}

function loadParams() {
  const saved = JSON.parse(localStorage.getItem("urban-abm-params") || "{}");
  for (const [k, v] of Object.entries(saved)) {
    const el = document.getElementById("p-" + k);
    if (el) el.value = v;
  }
  sendParams();
}

function resetParams() {
  localStorage.removeItem("urban-abm-params");
  location.reload();
}

function renderStats(msg) {
  const box = document.getElementById("stats");
  box.innerHTML = "";
  for (const key of statKeys) {
    const value = msg[key];
    const div = document.createElement("div");
    div.className = "stat";
    div.innerHTML = `<div class="k">${key.replaceAll("_", " ")}</div><div class="v">${fmt(value)}</div>`;
    box.appendChild(div);
  }
}

function fmt(v) {
  if (v === undefined || v === null) return "-";
  if (typeof v === "number" && Math.abs(v) < 10 && !Number.isInteger(v)) return v.toFixed(2);
  if (typeof v === "number") return Math.round(v).toLocaleString();
  return String(v);
}

function drawBars(id, obj) {
  const c = document.getElementById(id), ctx = c.getContext("2d");
  ctx.clearRect(0, 0, c.width, c.height);
  const vals = Object.entries(obj);
  const max = Math.max(1, ...vals.map(x => x[1]));
  vals.forEach(([k, v], i) => {
    const w = c.width / Math.max(1, vals.length);
    const h = (c.height - 26) * v / max;
    ctx.fillStyle = "#68a7ff";
    ctx.fillRect(i * w + 8, c.height - h - 18, w - 16, h);
    ctx.fillStyle = "#9aa8ad";
    ctx.fillText(k, i * w + 10, c.height - 6);
  });
}

function drawHistogram(id, vals) {
  const c = document.getElementById(id), ctx = c.getContext("2d");
  ctx.clearRect(0, 0, c.width, c.height);
  const bins = Array(10).fill(0);
  vals.forEach(v => bins[Math.min(9, Math.floor(v / 2))]++);
  const max = Math.max(1, ...bins);
  bins.forEach((v, i) => {
    const w = c.width / bins.length;
    const h = (c.height - 16) * v / max;
    ctx.fillStyle = "#e9be62";
    ctx.fillRect(i * w + 3, c.height - h - 6, w - 6, h);
  });
}

function drawMapApprox(msg) {
  const c = document.getElementById("map"), ctx = c.getContext("2d");
  ctx.clearRect(0, 0, c.width, c.height);
  const lots = msg.lots || [];
  if (!lots.length) return;
  const maxX = Math.max(...lots.map(l => l.x));
  const maxY = Math.max(...lots.map(l => l.y));
  const cell = Math.min(c.width / maxX, c.height / maxY);
  for (const l of lots) {
    const total = Math.max(1, l.residential_units + l.commercial_units);
    const occ = (l.occupied_residential + l.occupied_commercial) / total;
    const mix = l.commercial_units / total;
    const r = Math.floor(45 + 110 * mix);
    const g = Math.floor(70 + 120 * occ);
    const b = Math.floor(95 + 100 * (1 - mix));
    ctx.fillStyle = `rgb(${r},${g},${b})`;
    ctx.fillRect((l.x - 1) * cell, (l.y - 1) * cell, Math.ceil(cell), Math.ceil(cell));
  }
}

function log(text) {
  const row = document.createElement("div");
  row.textContent = new Date().toLocaleTimeString() + "  " + text;
  document.getElementById("log").appendChild(row);
}

connect();
</script>
</body>
</html>
